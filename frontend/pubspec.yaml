name: sentiment_analyzer
description: A Flutter app for sentiment analysis of movie reviews.
version: 1.0.1+2

environment:
  sdk: '^3.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.1
  supabase_flutter: ^2.8.3
  flutter_dotenv: ^5.1.0
  flutter_local_notifications: ^17.1.2
  speech_to_text: ^7.3.0

flutter:
  uses-material-design: true
  assets:
    - .env
  fonts:
    - family: NotoSans
      fonts:
        - asset: fonts/NotoSans-Regular.ttf
          weight: 400
        - asset: fonts/NotoSans-Bold.ttf
          weight: 700

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#F7F8FC"
  adaptive_icon_foreground: "assets/icon/adaptive_foreground.png"

flutter_native_splash:
  color: "#F7F8FC"
  image: "assets/splash/splash.png"
  android: true
  ios: true
  web: false
  android_gravity: center
  ios_content_mode: center
  android_12:
    color: "#F7F8FC"
    image: "assets/splash/splash.png"
